name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Guard public webhook env usage
        run: npm run guard:webhook-public-env

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_BASE_URL: https://placeholder.com
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: placeholder
          OPENAI_API_KEY: sk-placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          STRIPE_PRICE_SNAPSHOT_PLUS: price_placeholder
          STRIPE_PRICE_BLUEPRINT: price_placeholder
          STRIPE_PRICE_BLUEPRINT_PLUS: price_placeholder
